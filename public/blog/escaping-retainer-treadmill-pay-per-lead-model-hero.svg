<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="655" viewBox="0 0 1200 655">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FAF5EB"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="-20%" r="60%">
      <stop offset="0%" stop-color="#C9A961" stop-opacity="0.20"/>
      <stop offset="70%" stop-color="#C9A961" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="655" fill="url(#bg)"/>
  <rect width="1200" height="655" fill="url(#glow)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="8" fill="#C9A961"/>

  <!-- Brand mark -->
  <g transform="translate(80, 80)">
    <rect width="56" height="56" rx="12" fill="#C9A961"/>
    <text x="28" y="38" text-anchor="middle" fill="#171717" font-family="'Fraunces',ui-serif,'Iowan Old Style','Apple Garamond','Baskerville','Times New Roman',serif" font-size="28" font-weight="800" letter-spacing="-0.02em">GM</text>
  </g>
  <text x="160" y="118" fill="#525252" font-family="'DM Sans',ui-sans-serif,system-ui,-apple-system,'Segoe UI',Roboto,sans-serif" font-size="18" font-weight="600" letter-spacing="0.04em">GREAT MARKETING AI</text>

  <!-- Title -->
  <text x="600" y="178" text-anchor="middle" fill="#171717" font-family="'Fraunces',ui-serif,'Iowan Old Style','Apple Garamond','Baskerville','Times New Roman',serif" font-size="64" font-weight="700" letter-spacing="-0.02em">
    <tspan x="600" dy="0">Escaping the Retainer</tspan>
    <tspan x="600" dy="80">Treadmill: The Pay Per Lead</tspan>
    <tspan x="600" dy="80">Model</tspan>
  </text>

  

  <!-- Footer domain -->
  <text x="600" y="600" text-anchor="middle" fill="#737373" font-family="'DM Sans',ui-sans-serif,system-ui,-apple-system,'Segoe UI',Roboto,sans-serif" font-size="16" font-weight="500">greatmarketing.ai/blog</text>
</svg>
